name: Bug Report
description: Report a bug in Hariari
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.
  - type: input
    id: version
    attributes:
      label: Hariari Version
      description: Run `Help > About` or check the title bar
      placeholder: "0.5.4"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Linux (Debian/Ubuntu)
        - Linux (Fedora/RHEL)
        - Linux (Arch)
        - Linux (Other)
        - macOS
        - Windows
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation Method
      options:
        - .deb package
        - AppImage
        - .dmg
        - .exe installer
        - Built from source
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots
    validations:
      required: false
  - type: textarea
    id: agents
    attributes:
      label: AI Agents Involved
      description: Which agents were running when the bug occurred? (e.g., Claude Code, Gemini)
    validations:
      required: false
