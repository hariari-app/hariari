<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=400">
<title>Hariari - Twitter Profile Picture (400x400)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 400px; height: 400px; overflow: hidden;
    background: #1a1b26;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  /* Subtle radial glow behind the logo */
  .glow {
    position: absolute; width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(129,140,248,0.12) 0%, rgba(74,222,128,0.06) 50%, transparent 70%);
    pointer-events: none;
  }

  svg.logo {
    width: 280px; height: 280px;
    position: relative; z-index: 1;
    filter: drop-shadow(0 4px 24px rgba(129,140,248,0.2));
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <svg class="logo" viewBox="0 0 512 512">
    <defs>
      <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#818cf8"/>
        <stop offset="100%" stop-color="#4ade80"/>
      </linearGradient>
      <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#818cf8"/>
        <stop offset="100%" stop-color="#4ade80"/>
      </linearGradient>
    </defs>

    <!-- Rounded square background -->
    <rect width="512" height="512" rx="80" fill="#1a1b26"/>

    <!-- Upper wings -->
    <ellipse cx="206" cy="185" rx="72" ry="28" transform="rotate(-35 206 185)" fill="url(#g1)" opacity=".85"/>
    <ellipse cx="306" cy="185" rx="72" ry="28" transform="rotate(35 306 185)" fill="url(#g2)" opacity=".85"/>

    <!-- Lower wings -->
    <ellipse cx="212" cy="235" rx="62" ry="24" transform="rotate(-25 212 235)" fill="url(#g1)" opacity=".6"/>
    <ellipse cx="300" cy="235" rx="62" ry="24" transform="rotate(25 300 235)" fill="url(#g2)" opacity=".6"/>

    <!-- Body -->
    <path d="M256 160c8 10 10 40 10 60s-2 100-6 150c-1 10-7 10-8 0-4-50-6-130-6-150s2-50 10-60z" fill="#c0caf5" opacity=".9"/>

    <!-- Head -->
    <circle cx="256" cy="155" r="14" fill="#c0caf5" opacity=".95"/>

    <!-- Thorax glow -->
    <circle cx="256" cy="210" r="8" fill="#ffffff" opacity=".15"/>
  </svg>
</body>
</html>
