appId: com.hariari.app
productName: Hariari
directories:
  buildResources: resources
  output: dist
files:
  - out/**/*
  - "!**/*.map"
extraMetadata:
  main: ./out/main/index.js
icon: resources/icons/512x512.png
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Development
  icon: resources/icons/512x512.png
  synopsis: AI agent terminal orchestrator for vibe coders
  description: >
    Hariari is a project-centric terminal orchestrator for developers who use
    AI agents. Manage multiple projects, spawn terminals and AI agents,
    switch between workspaces, and monitor agent status — all from one app.
  desktop:
    StartupWMClass: hariari
deb:
  afterInstall: scripts/post-install.sh
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
    - libatspi2.0-0
    - libuuid1
appImage:
  artifactName: Hariari-${version}-${arch}.AppImage
mac:
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  category: public.app-category.developer-tools
  icon: resources/icons/512x512.png
  artifactName: Hariari-${version}-${arch}.${ext}
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.mac.inherit.plist
  notarize: false
afterPack: scripts/after-pack.js
afterSign: scripts/notarize.js
dmg:
  artifactName: Hariari-${version}-${arch}.dmg
win:
  target:
    - nsis
  icon: resources/icons/512x512.png
  artifactName: Hariari-${version}-${arch}.${ext}
  signtoolOptions:
    sign: ./scripts/azure-sign.js
    signingHashAlgorithms:
      - sha256
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  shortcutName: Hariari
publish:
  provider: github
  owner: hariari-app
  repo: hariari
